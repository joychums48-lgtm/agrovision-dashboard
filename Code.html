<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word & Character Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      color: #ffffff;
      font-size: 26px;
      margin-bottom: 6px;
      text-align: center;
    }

    p.subtitle {
      color: #a0aec0;
      text-align: center;
      font-size: 14px;
      margin-bottom: 28px;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border 0.3s;
    }

    textarea::placeholder { color: #718096; }
    textarea:focus { border-color: #63b3ed; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .stat-box {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat-box .number {
      font-size: 32px;
      font-weight: 700;
      color: #63b3ed;
    }

    .stat-box .label {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .clear-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .clear-btn:hover { opacity: 0.85; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✍️ Word & Character Counter</h1>
    <p class="subtitle">Type or paste your text below to analyze it instantly</p>

    <textarea id="textInput" placeholder="Start typing or paste your text here..."></textarea>

    <div class="stats">
      <div class="stat-box">
        <div class="number" id="wordCount">0</div>
        <div class="label">Words</div>
      </div>
      <div class="stat-box">
        <div class="number" id="charCount">0</div>
        <div class="label">Characters</div>
      </div>
      <div class="stat-box">
        <div class="number" id="sentenceCount">0</div>
        <div class="label">Sentences</div>
      </div>
    </div>

    <button class="clear-btn" onclick="clearText()">Clear Text</button>

    <div class="footer">Built with HTML, CSS & JavaScript · #MyFirstCode</div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');
    const sentenceCount = document.getElementById('sentenceCount');

    input.addEventListener('input', () => {
      const text = input.value;
      const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      const chars = text.length;
      const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim()).length;

      wordCount.textContent = words;
      charCount.textContent = chars;
      sentenceCount.textContent = sentences;
    });

    function clearText() {
      input.value = '';
      wordCount.textContent = '0';
      charCount.textContent = '0';
      sentenceCount.textContent = '0';
    }
  </script>
</body>
  </html>
