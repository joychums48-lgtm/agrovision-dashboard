<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Facts</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        #fact { margin: 20px; font-size: 24px; }
        button { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Random Fun Facts</h1>
    <div id="fact">Click the button to generate a fun fact!</div>
    <button onclick="generateFact()">Get a Fun Fact!</button>

    <script>
        const facts = [
            "Honey never spoils.",
            "Bananas are berries but strawberries aren't.",
            "There are more stars in the universe than grains of sand on Earth.",
            "A day on Venus is longer than a year on Venus.",
            "Kangaroos can't walk backwards."
        ];

        function generateFact() {
            const randomIndex = Math.floor(Math.random() * facts.length);
            document.getElementById('fact').innerText = facts[randomIndex];
        }
    </script>
</body>
</html>
